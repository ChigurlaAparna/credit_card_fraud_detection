{% extends "base.html" %}

{% block title %}Error - Fraud Detection{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-danger">
                <div class="card-body text-center py-5">
                    <i class="fas fa-exclamation-circle text-danger fa-5x mb-4"></i>
                    <h2 class="text-danger mb-3">Oops! Something went wrong</h2>
                    <p class="text-muted mb-4">{{ error if error else 'An unexpected error occurred.' }}</p>
                    <div class="d-flex justify-content-center gap-2">
                        <a href="/" class="btn btn-primary">
                            <i class="fas fa-home me-2"></i>Go Home
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Go Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
